name: collect-etf-data

on:
  workflow_dispatch:
    inputs:
      otc_codes:
        description: "Optional OTC fund codes, separated by commas or spaces"
        required: false
        default: ""
      etf_codes:
        description: "Optional ETF codes, separated by commas or spaces"
        required: false
        default: ""
  schedule:
    - cron: "*/10 1-8 * * 1-5"

concurrency:
  group: collect-etf-data
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Init database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python db_admin.py init
      - name: Seed watchlists
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ETF_WATCHLIST_CODES: ${{ github.event.inputs.etf_codes || vars.ETF_WATCHLIST_CODES || secrets.ETF_WATCHLIST_CODES }}
          OTC_WATCHLIST_CODES: ${{ github.event.inputs.otc_codes || vars.OTC_WATCHLIST_CODES || secrets.OTC_WATCHLIST_CODES }}
        run: python db_admin.py seed-watchlist
      - name: Collect market snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OTC_WATCHLIST_CODES: ${{ github.event.inputs.otc_codes || vars.OTC_WATCHLIST_CODES || secrets.OTC_WATCHLIST_CODES }}
        run: |
          python collector.py
          python otc_collector.py
